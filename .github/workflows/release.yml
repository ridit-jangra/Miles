name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: [linux, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Python venv + deps
        run: |
          python3.11 -m venv .venv || python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt pyinstaller

      - name: Node deps
        run: bun install --frozen-lockfile || bun install

      - name: Clean previous build
        run: rm -rf build dist

      - name: Build slim app (CUDA bundled, models fetched at runtime)
        run: bash scripts/build-app.sh --linux --publish never

      - name: Build models pack
        run: bash scripts/build-packs.sh

      - name: Sanity-check artifact size (GitHub caps assets at 2GB)
        run: |
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] || continue
            bytes=$(stat -c%s "$f")
            echo "$f -> $(du -h "$f" | cut -f1)"
            if [ "$bytes" -gt 2147483648 ]; then
              echo "::error::$f exceeds GitHub's 2GB release-asset limit"
              exit 1
            fi
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
            dist/packs/models.tar.gz
            dist/packs/models.tar.gz.sha256

  release-windows:
    runs-on: windows-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: oven-sh/setup-bun@v2

      - name: Python venv + deps
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install --no-cache-dir -r requirements.txt pyinstaller

      - name: Node deps
        run: bun install --frozen-lockfile

      - name: Build slim app (models fetched at runtime)
        run: powershell -ExecutionPolicy Bypass -File scripts/build-app.ps1 --win --publish never

      - name: Sanity-check artifact size (GitHub caps assets at 2GB)
        run: |
          $failed = $false
          Get-ChildItem dist -Filter '*setup.exe' | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB)
            Write-Host "$($_.Name) -> ${mb}MB"
            if ($_.Length -gt 2147483648) {
              Write-Host "::error::$($_.Name) exceeds GitHub's 2GB release-asset limit"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*-setup.exe
            dist/*.blockmap
            dist/latest.yml
